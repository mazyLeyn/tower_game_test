<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sky Scraper: To Space</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #e0ff4f;
    --text: #f0f0f8;
    --muted: #4a4a6a;
    --danger: #ff4f6e;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--text);
    touch-action: none;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 28px 0;
    pointer-events: none;
  }

  #score-label {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(56px, 12vw, 96px);
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(224,255,79,.35);
    letter-spacing: 2px;
    transition: text-shadow 0.3s;
  }
  #score-label.combo-glow {
    text-shadow: 0 0 60px rgba(224,255,79,.9), 0 0 100px rgba(224,255,79,.4);
  }

  #best-label {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }
  #best-label span { color: var(--accent); font-size: 20px; display: block; }

  /* ── COMBO HUD ── */
  #combo-hud {
    position: fixed;
    top: 0; left: 50%; transform: translateX(-50%);
    z-index: 110;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #combo-hud.visible { opacity: 1; }
  #combo-count {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(28px, 6vw, 46px);
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(224,255,79,.8);
    line-height: 1;
  }
  #combo-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(224,255,79,.6);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── CANVAS ── */
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ── OVERLAY SCREENS ── */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(12px);
    gap: 20px;
    transition: opacity .4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .screen-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(52px, 14vw, 110px);
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 60px rgba(224,255,79,.4);
    line-height: 1;
  }

  .screen-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    text-align: center;
    line-height: 2;
    max-width: 280px;
  }

  .btn {
    margin-top: 10px;
    padding: 14px 42px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
    transition: transform .15s, box-shadow .15s;
    outline: none;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(224,255,79,.35); }
  .btn:active { transform: translateY(0); }

  #gameover-score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(28px, 6vw, 44px);
    color: var(--text);
    letter-spacing: 2px;
  }

  /* ── SPEED BADGE ── */
  #speed-badge {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity .5s;
  }
  #speed-badge.show { opacity: 1; }

  /* ── PERFECT FLASH ── */
  #perfect-flash {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Bebas Neue', cursive;
    font-size: 48px;
    color: var(--accent);
    letter-spacing: 6px;
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    text-shadow: 0 0 30px rgba(224,255,79,.7);
  }
  @keyframes perfectPop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.6); }
    30%  { opacity:1; transform:translate(-50%,-55%) scale(1.15); }
    70%  { opacity:1; transform:translate(-50%,-60%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-70%) scale(.9); }
  }
  #perfect-flash.pop { animation: perfectPop .9s ease forwards; }
</style>
</head>
<body>
<div id="app">

  <div id="hud">
    <div id="score-label">0</div>
    <div id="best-label">BEST<span id="best-val">0</span></div>
  </div>

  <!-- Combo HUD -->
  <div id="combo-hud">
    <div id="combo-count">×1</div>
    <div id="combo-label">Perfect Combo</div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="perfect-flash">PERFECT</div>
  <div id="speed-badge">⚡ Speed Up!</div>

  <div class="screen" id="start-screen">
    <div class="screen-title">Sky Scraper:<br>To Space</div>
    <div class="screen-sub">Tap or press <strong>SPACE</strong> to place blocks.<br>Build as high as you can.</div>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <div class="screen hidden" id="gameover-screen">
    <div class="screen-title">GAME<br>OVER</div>
    <div id="gameover-score">SCORE — 0</div>
    <div class="screen-sub">Blocks slipped — tower collapsed.</div>
    <button class="btn" id="restart-btn">TRY AGAIN</button>
  </div>

</div>

<script>
(() => {
  // ── CONFIG ──────────────────────────────────────────────────────
  const BLOCK_H        = 28;
  const BASE_SPEED     = 2.8;
  const SPEED_STEP     = 0.22;
  const PERFECT_TOL    = 4;
  const CAMERA_EASE    = 0.08;
  const GROUND_BLOCKS  = 4;
  const BG_COLOR       = '#0a0a0f';

  // ── STATE ───────────────────────────────────────────────────────
  let blocks = [], moving = null;
  let score = 0, best = 0;
  let hue = 160;
  let cameraY = 0, targetCameraY = 0;
  let gameRunning = false;
  let animId = null;
  let speedBadgeTimer = null;

  // VFX state
  let particles      = [];   // { x,y,vx,vy,life,maxLife,r,color,rot,vrot,type }
  let fallingChunks  = [];   // { x,y,w,vx,vy,vrot,rot,color,alpha }
  let shockwaves     = [];   // { x,y,r,maxR,life,maxLife }
  let screenShake    = { x:0, y:0, mag:0, decay:0.85 };
  let comboCount     = 0;
  let comboVisible   = false;
  let comboTimer     = null;

  // Parallax bg layers
  const BG_LAYERS = [
    { speed: 0.08, alpha: 0.04, size: 120 },
    { speed: 0.18, alpha: 0.035, size: 60 },
    { speed: 0.32, alpha: 0.03, size: 25 },
  ];

  // ── DOM ─────────────────────────────────────────────────────────
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const scoreEl     = document.getElementById('score-label');
  const bestEl      = document.getElementById('best-val');
  const startScreen = document.getElementById('start-screen');
  const goScreen    = document.getElementById('gameover-screen');
  const goScore     = document.getElementById('gameover-score');
  const startBtn    = document.getElementById('start-btn');
  const restartBtn  = document.getElementById('restart-btn');
  const perfectEl   = document.getElementById('perfect-flash');
  const speedBadge  = document.getElementById('speed-badge');
  const comboHud    = document.getElementById('combo-hud');
  const comboCountEl= document.getElementById('combo-count');

  // ── RESIZE ──────────────────────────────────────────────────────
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── HELPERS ─────────────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }

  function easeOutElastic(t) {
    const c4 = (2 * Math.PI) / 4.5;
    return t === 0 ? 0 : t === 1 ? 1 :
      Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  }

  function getSpeed() {
    return BASE_SPEED + Math.floor(score / 5) * SPEED_STEP;
  }

  // ── BLOCK VISUALS ────────────────────────────────────────────────
  // Gradient cache: key = "h_w" → reuse across frames for same block
  const _gradCache = new Map();
  function blockGradient(h, x, y, w) {
    // Gradients are position-dependent in Canvas, so we use a 0-based
    // gradient and apply it via pattern trick — instead, just create
    // a simple top→bottom gradient once per unique (h,w) combo.
    // We re-create only when the cache would grow stale (hue changes per block).
    const key = `${h % 360}_${Math.round(w)}`;
    if (_gradCache.has(key)) return _gradCache.get(key);
    const l1 = 68, s1 = 72;
    // Use a 0,0 → 0,BLOCK_H gradient (position-independent direction)
    const g = ctx.createLinearGradient(0, 0, 0, BLOCK_H);
    g.addColorStop(0,   `hsl(${h % 360}, ${s1}%, ${l1}%)`);
    g.addColorStop(0.4, `hsl(${(h+15) % 360}, ${s1-5}%, ${l1-8}%)`);
    g.addColorStop(1,   `hsl(${(h+35) % 360}, 65%, ${l1-20}%)`);
    if (_gradCache.size > 80) _gradCache.clear(); // prevent unbounded growth
    _gradCache.set(key, g);
    return g;
  }

  function drawBlock(b, alpha = 1, isTop = false) {
    const screenY = b.y - cameraY + screenShake.y;
    const screenX = b.x + screenShake.x;
    if (screenY > canvas.height + 60 || screenY < -80) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(screenX, screenY);

    // Neon glow — only on top block and only when needed (expensive)
    if (isTop || comboCount >= 3) {
      const glowIntensity = isTop ? 10 + comboCount * 3 : 6;
      ctx.shadowColor = `hsl(${b.color % 360}, 80%, 65%)`;
      ctx.shadowBlur  = glowIntensity;
    }

    ctx.fillStyle = blockGradient(b.color, 0, 0, b.w);
    ctx.beginPath();
    ctx.roundRect(0, 0, b.w, BLOCK_H, 4);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Glassmorphic top sheen — static gradient (no position needed)
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.roundRect(2, 2, b.w - 4, BLOCK_H * 0.45, 3);
    ctx.fill();

    // Edge rim light
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(0.5, 0.5, b.w - 1, BLOCK_H - 1, 4);
    ctx.stroke();

    ctx.restore();
  }

  function drawMoving() {
    if (!moving) return;
    const screenY = moving.y - cameraY + screenShake.y;
    const screenX = moving.x + screenShake.x;

    // Predict line — single path
    ctx.save();
    ctx.strokeStyle = `hsla(${moving.color}, 70%, 60%, 0.13)`;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 7]);
    ctx.beginPath();
    ctx.moveTo(screenX, screenY + BLOCK_H / 2);
    ctx.lineTo(screenX + moving.w, screenY + BLOCK_H / 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    drawBlock(moving, 0.92, true);
  }

  // ── PARALLAX BACKGROUND ──────────────────────────────────────────
  function drawBackground() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Ambient vertical gradient tint that shifts with height
    const depth = -targetCameraY / 2000;
    const r = Math.floor(lerp(10, 5, Math.min(depth, 1)));
    const g2 = Math.floor(lerp(10, 8, Math.min(depth, 1)));
    const b2 = Math.floor(lerp(15, 25, Math.min(depth, 1)));
    ctx.fillStyle = `rgb(${r},${g2},${b2})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Multi-layer parallax grids — batched into single path per layer
    BG_LAYERS.forEach((layer, li) => {
      const offset = (cameraY * layer.speed) % layer.size;
      const sx = screenShake.x * (li + 1) * 0.3;
      const sy = screenShake.y * (li + 1) * 0.3;
      ctx.save();
      ctx.strokeStyle = `rgba(224,255,79,${layer.alpha + depth * 0.015})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); // single path for ALL lines in this layer
      const cols = Math.ceil(canvas.width / layer.size) + 2;
      for (let i = -1; i < cols; i++) {
        const x = i * layer.size + sx;
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
      }
      const rows = Math.ceil(canvas.height / layer.size) + 2;
      for (let i = -1; i < rows; i++) {
        const y = i * layer.size - offset + sy;
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
      }
      ctx.stroke(); // one draw call for whole grid layer
      ctx.restore();
    });

    // Distant horizon glow at the top as tower gets taller
    if (depth > 0.1) {
      const horizGrad = ctx.createRadialGradient(
        canvas.width / 2, canvas.height * 0.2, 0,
        canvas.width / 2, canvas.height * 0.2, canvas.width * 0.7
      );
      const a = Math.min(depth * 0.06, 0.08);
      horizGrad.addColorStop(0, `hsla(${hue}, 70%, 50%, ${a})`);
      horizGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = horizGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ── PARTICLES ────────────────────────────────────────────────────
  const MAX_PARTICLES = 60; // hard cap

  function spawnPerfectParticles(cx, cy) {
    const count = Math.min(16 + comboCount * 3, 28); // was 28+combo*6
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
      const speed = 2 + Math.random() * 3 + comboCount * 0.4;
      const h2 = (hue + Math.random() * 50 - 25 + 360) % 360;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.2,
        life: 1, maxLife: 1,
        r: 2 + Math.random() * 2.5,
        color: h2, // store raw hue int, build string at draw time
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.2,
        type: Math.random() < 0.4 ? 1 : 0, // 0=circle, 1=square
        gravity: 0.07,
      });
    }
    // Streaks — fewer, no shadowBlur needed
    for (let i = 0; i < 5; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3.5 + Math.random() * 4;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.55, maxLife: 0.55,
        r: 0, color: -1, // -1 = white streak
        rot: angle, vrot: 0,
        type: 2, // streak
        gravity: 0,
        pvx: Math.cos(angle) * speed, pvy: Math.sin(angle) * speed,
      });
    }
    // Enforce global cap
    if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
  }

  function spawnFallingChunk(x, y, w, colorH, side) {
    // "side" is 'left' or 'right' — which offcut fell
    const vx = side === 'left' ? -1.5 - Math.random() * 2 : 1.5 + Math.random() * 2;
    fallingChunks.push({
      x, y,
      w: Math.max(w, 4),
      vx,
      vy: -1 - Math.random() * 1.5,
      vrot: (Math.random() - 0.5) * 0.12,
      rot: 0,
      color: colorH,
      alpha: 1,
    });
  }

  function spawnShockwave(cx, cy) {
    shockwaves.push({ x: cx, y: cy, r: 0, maxR: 90 + comboCount * 20, life: 1, maxLife: 1 });
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity || 0;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.rot += p.vrot;
      p.life -= 0.028; // slightly faster decay = fewer active particles
      if (p.life <= 0) { particles.splice(i, 1); }
    }
  }

  function updateFallingChunks() {
    const GRAVITY = 0.38;
    for (let i = fallingChunks.length - 1; i >= 0; i--) {
      const c = fallingChunks[i];
      c.vy   += GRAVITY;
      c.x    += c.vx;
      c.y    += c.vy;
      c.rot  += c.vrot;
      c.alpha -= 0.012;
      if (c.alpha <= 0 || c.y - cameraY > canvas.height + 60) {
        fallingChunks.splice(i, 1);
      }
    }
  }

  function updateShockwaves() {
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.r    += (s.maxR - s.r) * 0.14;
      s.life -= 0.04;
      if (s.life <= 0) shockwaves.splice(i, 1);
    }
  }

  function drawParticles() {
    if (!particles.length) return;
    const sx = screenShake.x, sy = screenShake.y - cameraY;

    // Draw circles in one pass
    ctx.beginPath();
    // We can't batch different alphas/colors easily, so group by type and draw individually
    // but avoid save/restore and shadowBlur entirely
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const alpha = Math.max(0, p.life / p.maxLife);
      const px = p.x + sx, py = p.y + sy;

      if (p.type === 2) {
        // streak
        ctx.globalAlpha = alpha * 0.9;
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth   = 1.2;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - p.pvx * 2.5, py - p.pvy * 2.5);
        ctx.stroke();
      } else {
        const colorStr = `hsl(${p.color % 360},88%,70%)`;
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = colorStr;
        if (p.type === 1) {
          // square — no rotate (skip translate/rotate for perf)
          ctx.fillRect(px - p.r, py - p.r, p.r * 2, p.r * 2);
        } else {
          // circle
          ctx.beginPath();
          ctx.arc(px, py, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawFallingChunks() {
    if (!fallingChunks.length) return;
    fallingChunks.forEach(c => {
      const screenY = c.y - cameraY + screenShake.y;
      const screenX = c.x + screenShake.x;
      if (screenY > canvas.height + 80) return;
      ctx.save();
      ctx.globalAlpha = c.alpha;
      ctx.translate(screenX + c.w / 2, screenY + BLOCK_H / 2);
      ctx.rotate(c.rot);
      // Simple flat color — no gradient, no shadowBlur on falling debris
      ctx.fillStyle = `hsl(${c.color % 360}, 70%, 58%)`;
      ctx.beginPath();
      ctx.roundRect(-c.w/2, -BLOCK_H/2, c.w, BLOCK_H, 3);
      ctx.fill();
      // Minimal sheen
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(-c.w/2, -BLOCK_H/2, c.w, BLOCK_H * 0.4);
      ctx.restore();
    });
  }

  function drawShockwaves() {
    if (!shockwaves.length) return;
    shockwaves.forEach(s => {
      const screenY = s.y - cameraY + screenShake.y;
      const screenX = s.x + screenShake.x;
      const alpha   = s.life * 0.65;
      const lw      = Math.max(0.5, s.life * 3.5);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = `hsl(${hue}, 88%, 72%)`;
      ctx.lineWidth   = lw;
      // Outer ring
      ctx.beginPath();
      ctx.ellipse(screenX, screenY, s.r, s.r * 0.26, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Inner ring
      ctx.globalAlpha = alpha * 0.35;
      ctx.lineWidth   = 0.8;
      ctx.beginPath();
      ctx.ellipse(screenX, screenY, s.r * 0.55, s.r * 0.15, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });
  }

  // ── SCREEN SHAKE ─────────────────────────────────────────────────
  function triggerShake(magnitude) {
    screenShake.mag = magnitude;
  }

  function updateShake() {
    if (screenShake.mag < 0.1) { screenShake.x = 0; screenShake.y = 0; return; }
    screenShake.x   = (Math.random() - 0.5) * screenShake.mag;
    screenShake.y   = (Math.random() - 0.5) * screenShake.mag;
    screenShake.mag *= screenShake.decay;
  }

  // ── CAMERA ───────────────────────────────────────────────────────
  let cameraEaseT    = 0;
  let cameraEaseFrom = 0;
  let cameraEaseTo   = 0;
  let cameraEasing   = false;

  function startCameraEase(to) {
    cameraEaseFrom = cameraY;
    cameraEaseTo   = to;
    cameraEaseT    = 0;
    cameraEasing   = true;
  }

  function updateCamera() {
    if (cameraEasing) {
      cameraEaseT = Math.min(1, cameraEaseT + 0.04);
      cameraY      = lerp(cameraEaseFrom, cameraEaseTo, easeOutElastic(cameraEaseT));
      if (cameraEaseT >= 1) cameraEasing = false;
    } else {
      cameraY += (targetCameraY - cameraY) * CAMERA_EASE;
    }
  }

  // ── BLOCK FACTORY ────────────────────────────────────────────────
  function makeBase() {
    const W  = canvas.width;
    const bw = Math.min(W * 0.55, 260);
    const cx = W / 2 - bw / 2;
    return { x: cx, w: bw, y: 0, color: 160 };
  }

  function spawnMoving() {
    const last  = blocks[blocks.length - 1];
    const dir   = (Math.random() < 0.5) ? 1 : -1;
    const startX = dir === 1 ? -last.w - 20 : canvas.width + 20;
    hue = (hue + 18) % 360;
    moving = { x: startX, w: last.w, y: last.y - BLOCK_H, dir, color: hue };
  }

  // ── INIT GAME ────────────────────────────────────────────────────
  function initGame() {
    blocks         = [];
    moving         = null;
    score          = 0;
    hue            = 160;
    particles      = [];
    fallingChunks  = [];
    shockwaves     = [];
    comboCount     = 0;
    screenShake.mag = 0;

    const base = makeBase();
    for (let i = 0; i < GROUND_BLOCKS; i++) {
      blocks.push({ x: base.x, w: base.w, y: -i * BLOCK_H, color: hue + i * 15 });
    }

    const topBlock    = blocks[blocks.length - 1];
    targetCameraY     = topBlock.y - canvas.height * 0.7;
    cameraY           = targetCameraY;
    cameraEasing      = false;

    scoreEl.textContent = '0';
    updateComboUI();
    spawnMoving();
  }

  // ── COMBO ────────────────────────────────────────────────────────
  function updateComboUI() {
    if (comboCount >= 2) {
      comboCountEl.textContent = `×${comboCount}`;
      comboHud.classList.add('visible');
      scoreEl.classList.add('combo-glow');
    } else {
      comboHud.classList.remove('visible');
      scoreEl.classList.remove('combo-glow');
    }
  }

  function resetCombo() {
    comboCount = 0;
    updateComboUI();
  }

  // ── PLACE BLOCK ──────────────────────────────────────────────────
  function placeBlock() {
    if (!moving || !gameRunning) return;
    const last = blocks[blocks.length - 1];

    const overlapStart = Math.max(moving.x, last.x);
    const overlapEnd   = Math.min(moving.x + moving.w, last.x + last.w);
    const overlap      = overlapEnd - overlapStart;

    if (overlap <= 0) {
      endGame();
      return;
    }

    const diff = Math.abs(moving.x - last.x);
    let isPerfect = false;

    if (diff <= PERFECT_TOL) {
      moving.x = last.x;
      moving.w = last.w;
      isPerfect = true;
      comboCount++;
    } else {
      // Spawn falling chunk(s)
      if (moving.x < last.x) {
        // left chunk falls
        spawnFallingChunk(moving.x, moving.y, last.x - moving.x, moving.color, 'left');
      }
      if (moving.x + moving.w > last.x + last.w) {
        // right chunk falls
        spawnFallingChunk(last.x + last.w, moving.y, (moving.x + moving.w) - (last.x + last.w), moving.color, 'right');
      }
      moving.w = overlap;
      moving.x = overlapStart;
      resetCombo();
    }

    if (isPerfect) {
      triggerPerfect();
      spawnPerfectParticles(moving.x + moving.w / 2, moving.y + BLOCK_H / 2);
      spawnShockwave(moving.x + moving.w / 2, moving.y + BLOCK_H / 2);
      triggerShake(3 + comboCount * 0.8);
    } else {
      triggerShake(1.5);
    }

    blocks.push({ x: moving.x, w: moving.w, y: moving.y, color: moving.color });
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }

    if (score % 5 === 0) showSpeedBadge();

    updateComboUI();

    // Elastic camera snap
    const newTop = blocks[blocks.length - 1];
    targetCameraY = newTop.y - canvas.height * 0.68;
    startCameraEase(targetCameraY);

    spawnMoving();
  }

  // ── PERFECT FLASH ────────────────────────────────────────────────
  function triggerPerfect() {
    perfectEl.classList.remove('pop');
    void perfectEl.offsetWidth;
    perfectEl.classList.add('pop');
  }

  function showSpeedBadge() {
    speedBadge.classList.add('show');
    clearTimeout(speedBadgeTimer);
    speedBadgeTimer = setTimeout(() => speedBadge.classList.remove('show'), 1800);
  }

  // ── END GAME ─────────────────────────────────────────────────────
  function endGame() {
    gameRunning = false;
    goScore.textContent = `SCORE — ${score}`;
    goScreen.classList.remove('hidden');
  }

  // ── BLOCK SHADOW ─────────────────────────────────────────────────
  function drawShadows() {
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#000';
    ctx.beginPath(); // single path for all shadows
    blocks.forEach(b => {
      const screenY = b.y - cameraY + screenShake.y;
      if (screenY > canvas.height + 30 || screenY < -60) return;
      ctx.ellipse(b.x + screenShake.x + b.w / 2, screenY + BLOCK_H + 5, b.w * 0.42, 4, 0, 0, Math.PI * 2);
    });
    ctx.fill();
    ctx.restore();
  }

  // ── GAME LOOP ────────────────────────────────────────────────────
  function loop() {
    drawBackground();

    updateCamera();
    updateShake();
    updateParticles();
    updateFallingChunks();
    updateShockwaves();

    if (moving && gameRunning) {
      const speed = getSpeed();
      moving.x += moving.dir * speed;
      if (moving.x > canvas.width + 10) moving.dir = -1;
      if (moving.x + moving.w < -10)    moving.dir =  1;
    }

    // Draw placed blocks
    blocks.forEach((b, i) => {
      const isTop = i === blocks.length - 1;
      drawBlock(b, 1, isTop);
    });
    drawShadows();

    // VFX layers
    drawShockwaves();
    drawFallingChunks();
    drawParticles();

    drawMoving();

    animId = requestAnimationFrame(loop);
  }

  // ── INPUT ────────────────────────────────────────────────────────
  function handleAction() {
    if (gameRunning) placeBlock();
  }

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); handleAction(); }
  });
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    handleAction();
  });

  // ── START / RESTART ──────────────────────────────────────────────
  function startGame() {
    startScreen.classList.add('hidden');
    goScreen.classList.add('hidden');
    initGame();
    gameRunning = true;
    if (animId) cancelAnimationFrame(animId);
    loop();
  }

  startBtn.addEventListener('click',   startGame);
  restartBtn.addEventListener('click', startGame);

  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !gameRunning) {
      e.preventDefault();
      startGame();
    }
  });

  loop();
})();
</script>
</body>
</html>
