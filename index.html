<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Builder - Deluxe</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg:#07070c;
  --accent:#e0ff4f;
}

body{
  overflow:hidden;
  background:var(--bg);
  font-family:'Space Mono';
  touch-action:none;
  user-select:none;
}

#canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* HUD unchanged visually */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;padding:20px;color:#fff}
#score-label{font-size:80px;color:var(--accent);font-family:'Bebas Neue'}
#best-label{font-size:12px;opacity:.6}

/* screens unchanged */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.8);z-index:100}
.hidden{display:none}

.btn{padding:12px 30px;background:var(--accent);border:none;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score-label">0</div>
  <div id="best-label">BEST <span id="best-val">0</span></div>
</div>

<div id="start-screen" class="screen">
  <h1 style="color:#e0ff4f">STACK BUILDER</h1>
  <button id="start-btn" class="btn">START</button>
</div>

<script>
(() => {

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ───────── CORE STATE ─────────
let blocks = [];
let moving = null;
let particles = [];
let debris = [];

let score = 0;
let combo = 0;

let cameraY = 0;
let camVel = 0;
let shake = 0;

const BLOCK_H = 28;
const BASE_SPEED = 2.8;
const PERFECT_TOL = 4;

let hue = 160;
let running = false;

// ───────── INPUT ─────────
window.addEventListener("keydown", e=>{
  if(e.code==="Space") place();
});
canvas.addEventListener("pointerdown", place);

// ───────── INIT ─────────
function init(){
  blocks=[];
  particles=[];
  debris=[];
  score=0;
  combo=0;
  hue=160;

  const base = {
    x: canvas.width/2 - 120,
    w: 240,
    y: 0,
    color: 160
  };

  blocks.push(base);

  spawn(); // ✅ ALWAYS SAFE
}

// ───────── SPAWN ─────────
function spawn(){
  const last = blocks[blocks.length-1];

  moving = {
    x: Math.random()<0.5 ? -200 : canvas.width+200,
    w: last.w,
    y: last.y - BLOCK_H,
    dir: Math.random()<0.5 ? 1 : -1,
    color: hue+=18
  };
}

// ───────── PLACE ─────────
function place(){
  if(!running || !moving) return;

  const last = blocks[blocks.length-1];

  const overlapStart = Math.max(moving.x, last.x);
  const overlapEnd = Math.min(moving.x+moving.w, last.x+last.w);
  const overlap = overlapEnd - overlapStart;

  if(overlap<=0){
    gameOver();
    return;
  }

  const diff = Math.abs(moving.x - last.x);

  if(diff < PERFECT_TOL){
    moving.x = last.x;
    combo++;
    shake += 6;
  } else {
    combo = 0;
    moving.w = overlap;
    moving.x = overlapStart;
  }

  blocks.push({...moving});

  score++;
  document.getElementById("score-label").innerText = score;

  spawn();
}

// ───────── UPDATE ─────────
function update(){

  const target = -score*BLOCK_H + canvas.height*0.6;
  camVel += (target - cameraY)*0.08;
  camVel *= 0.75;
  cameraY += camVel;

  shake *= 0.85;

  if(moving){
    moving.x += moving.dir * BASE_SPEED;

    if(moving.x > canvas.width+100) moving.dir = -1;
    if(moving.x < -200) moving.dir = 1;
  }
}

// ───────── DRAW ─────────
function draw(){
  ctx.fillStyle="#07070c";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(0, shake*(Math.random()-0.5));

  // blocks
  for(const b of blocks){
    const y = b.y - cameraY;

    ctx.shadowBlur = combo>2 ? 25 : 10;
    ctx.shadowColor = `hsl(${b.color},100%,60%)`;

    ctx.fillStyle = `hsl(${b.color},80%,55%)`;
    ctx.fillRect(b.x,y,b.w,BLOCK_H);

    ctx.shadowBlur = 0;
  }

  // moving block
  if(moving){
    const y = moving.y - cameraY;
    ctx.fillStyle = `hsl(${moving.color},80%,60%)`;
    ctx.fillRect(moving.x,y,moving.w,BLOCK_H);
  }

  ctx.restore();
}

// ───────── LOOP ─────────
function loop(){
  if(running){
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

// ───────── GAME OVER ─────────
function gameOver(){
  running = false;
  alert("Game Over: " + score);
}

// ───────── START FIX ─────────
document.getElementById("start-btn").onclick = () => {
  document.getElementById("start-screen").style.display = "none";
  init();
  running = true;
};

// 🔥 CRITICAL: FIRST INIT (so canvas is not empty black bug)
init();
loop();

})();
</script>

</body>
</html>
