<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Builder</title>
<style>
/* (CSS AYNEN KALDI) */
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --accent: #e0ff4f;
  --text: #f0f0f8;
  --muted: #4a4a6a;
  --danger: #ff4f6e;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Space Mono', monospace;
  color: var(--text);
  touch-action: none;
  user-select: none;
}
/* ... (CSSİN GERİ KALANI AYNI) ... */
</style>
</head>
<body>
<div id="app">

  <!-- HUD -->
  <div id="hud">
    <div id="score-label">0</div>
    <div id="best-label">BEST<span id="best-val">0</span></div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="perfect-flash">PERFECT</div>
  <div id="speed-badge">⚡ Speed Up!</div>

  <div class="screen" id="start-screen">
    <div class="screen-title">STACK<br>BUILDER</div>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <div class="screen hidden" id="gameover-screen">
    <div class="screen-title">GAME<br>OVER</div>
    <div id="gameover-score">SCORE — 0</div>
    <button class="btn" id="restart-btn">TRY AGAIN</button>
  </div>

</div>

<!-- 🎵 MÜZİK -->
<audio id="bg-music" src="gravity_letting_go.mp3" loop></audio>

<script>
(() => {

/* ───────── CONFIG ───────── */
const CONFIG = {
  blockHeight: 40,
  baseWidth: 260,
  speed: 2.2,
  ease: 0.05,
  gravity: 0.6,
  perfectThreshold: 6,
};

/* ───────── STATE ───────── */
let stack = [];
let fallingPieces = [];
let current;
let score = 0;
let combo = 0;
let hue = 140;

let cameraY = 0;
let targetCameraY = 0;
let shake = 0;

let running = false;
let anim;

/* ───────── DOM ───────── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-label');
const startScreen = document.getElementById('start-screen');
const goScreen = document.getElementById('gameover-screen');
const goScore = document.getElementById('gameover-score');

/* ───────── AUDIO ───────── */
const music = document.getElementById('bg-music');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const source = audioCtx.createMediaElementSource(music);

const analyser = audioCtx.createAnalyser();
analyser.fftSize = 64;

const lowPass = audioCtx.createBiquadFilter();
lowPass.type = "lowpass";

source.connect(analyser);
analyser.connect(lowPass);
lowPass.connect(audioCtx.destination);

const dataArray = new Uint8Array(analyser.frequencyBinCount);

/* NOTE SYNTH */
function playNote(i) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 220 + i * 20;
  osc.type = "sine";

  gain.gain.value = 0.1;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

/* ───────── RESIZE ───────── */
function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

/* ───────── BLOCK CLASS ───────── */
class Block {
  constructor(x, y, w) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.targetX = x;
  }

  update() {
    this.x += (this.targetX - this.x) * CONFIG.ease;
  }

  draw(pulse = 1) {
    ctx.fillStyle = `hsl(${hue}, 80%, ${50 + pulse*10}%)`;
    ctx.fillRect(this.x, this.y - cameraY, this.w, CONFIG.blockHeight);
  }
}

/* ───────── INIT ───────── */
function init() {
  stack = [];
  fallingPieces = [];
  score = 0;
  combo = 0;

  const base = new Block(
    canvas.width/2 - CONFIG.baseWidth/2,
    canvas.height - 100,
    CONFIG.baseWidth
  );

  stack.push(base);

  spawnBlock();
}

/* ───────── SPAWN ───────── */
function spawnBlock() {
  const last = stack[stack.length-1];

  current = new Block(-300, last.y - CONFIG.blockHeight, last.w);
  current.targetX = canvas.width;
}

/* ───────── PLACE ───────── */
function place() {
  const last = stack[stack.length-1];

  const diff = current.x - last.x;
  const overlap = last.w - Math.abs(diff);

  if (overlap <= 0) {
    endGame();
    return;
  }

  /* PERFECT */
  if (Math.abs(diff) < CONFIG.perfectThreshold) {
    current.x = last.x;
    combo++;
    current.w += 4;
    flash();
  } else {
    combo = 0;
  }

  /* SLICE */
  const cut = current.w - overlap;
  if (cut > 0) {
    const piece = {
      x: diff > 0 ? current.x + overlap : current.x,
      y: current.y,
      w: cut,
      vy: 0
    };
    fallingPieces.push(piece);
  }

  current.w = overlap;
  current.x = diff > 0 ? last.x : last.x + (last.w - overlap);

  stack.push(current);

  /* SCORE */
  score++;
  scoreEl.textContent = score;

  /* CAMERA */
  targetCameraY += CONFIG.blockHeight;

  /* COLOR SHIFT */
  hue += 8;

  /* SOUND */
  playNote(score);

  spawnBlock();
}

/* ───────── EFFECTS ───────── */
function flash() {
  const el = document.getElementById('perfect-flash');
  el.style.opacity = 1;
  setTimeout(()=> el.style.opacity = 0, 100);
}

/* ───────── UPDATE ───────── */
function update() {

  analyser.getByteFrequencyData(dataArray);
  const bass = dataArray[1] / 255;

  /* CAMERA LERP */
  cameraY += (targetCameraY - cameraY) * 0.1;

  /* SHAKE */
  const shakeX = (Math.random()-0.5) * shake;
  const shakeY = (Math.random()-0.5) * shake;
  ctx.setTransform(1,0,0,1,shakeX,shakeY);
  shake *= 0.9;

  /* MOVE CURRENT */
  if (current) {
    current.targetX = Math.sin(Date.now()*0.002) * (canvas.width/2) + canvas.width/2;
    current.update();
  }

  /* FALLING */
  fallingPieces.forEach(p=>{
    p.vy += CONFIG.gravity;
    p.y += p.vy;
  });

  /* DRAW */
  ctx.fillStyle = `hsl(${hue}, 30%, ${8 + bass*10}%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  stack.forEach(b=>b.draw(bass));
  if (current) current.draw(bass);

  fallingPieces.forEach(p=>{
    ctx.fillStyle = "#ff4f6e";
    ctx.fillRect(p.x, p.y - cameraY, p.w, CONFIG.blockHeight);
  });
}

/* ───────── LOOP ───────── */
function loop() {
  if (!running) return;
  update();
  anim = requestAnimationFrame(loop);
}

/* ───────── GAME OVER ───────── */
function endGame() {
  running = false;

  shake = 20;

  goScreen.classList.remove('hidden');
  goScore.textContent = `SCORE — ${score}`;

  /* HEAVY LOWPASS */
  lowPass.frequency.setTargetAtTime(200, audioCtx.currentTime, 0.05);
}

/* ───────── START ───────── */
function start() {
  startScreen.classList.add('hidden');
  goScreen.classList.add('hidden');

  init();
  running = true;

  audioCtx.resume();
  music.currentTime = 0;
  music.play();

  lowPass.frequency.setTargetAtTime(20000, audioCtx.currentTime, 0.1);

  loop();
}

/* ───────── INPUT ───────── */
canvas.addEventListener('pointerdown', () => {
  if (running) place();
});

/* ───────── BUTTONS ───────── */
document.getElementById('start-btn').onclick = start;
document.getElementById('restart-btn').onclick = start;

})();
</script>
</body>
</html>
