<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Builder - Deluxe</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg:#07070c;
  --accent:#e0ff4f;
}

body{
  overflow:hidden;
  background:var(--bg);
  font-family:'Space Mono';
  touch-action:none;
  user-select:none;
}

#canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* HUD unchanged visually */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;padding:20px;color:#fff}
#score-label{font-size:80px;color:var(--accent);font-family:'Bebas Neue'}
#best-label{font-size:12px;opacity:.6}

/* screens unchanged */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.8);z-index:100}
.hidden{display:none}

.btn{padding:12px 30px;background:var(--accent);border:none;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score-label">0</div>
  <div id="best-label">BEST <span id="best-val">0</span></div>
</div>

<div id="start-screen" class="screen">
  <h1 style="color:#e0ff4f">STACK BUILDER</h1>
  <button id="start-btn" class="btn">START</button>
</div>

<script>
(() => {

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ───────── CORE STATE ─────────
let blocks = [];
let moving = null;
let particles = [];
let debris = [];

let score = 0;
let combo = 0;
let best = 0;

let cameraY = 0;
let camVel = 0;
let shake = 0;

const BLOCK_H = 28;
const BASE_SPEED = 2.8;
const PERFECT_TOL = 4;

let hue = 160;

// ───────── INPUT ─────────
window.addEventListener("keydown", e=>{
  if(e.code==="Space") place();
});
canvas.addEventListener("pointerdown", place);

// ───────── INIT ─────────
function init(){
  blocks=[];
  particles=[];
  debris=[];
  score=0;
  combo=0;

  const base = {
    x: canvas.width/2 - 120,
    w: 240,
    y: 0,
    color: 160
  };

  blocks.push(base);
  spawn();
}

function spawn(){
  const last = blocks[blocks.length-1];
  moving = {
    x: Math.random()<0.5 ? -200 : canvas.width+200,
    w: last.w,
    y: last.y - BLOCK_H,
    dir: Math.random()<0.5 ? 1 : -1,
    color: hue+=18
  };
}

// ───────── PLACE BLOCK ─────────
function place(){
  const last = blocks[blocks.length-1];

  const overlapStart = Math.max(moving.x, last.x);
  const overlapEnd = Math.min(moving.x+moving.w, last.x+last.w);
  const overlap = overlapEnd - overlapStart;

  if(overlap<=0){
    gameOver();
    return;
  }

  const diff = Math.abs(moving.x - last.x);

  // PERFECT
  if(diff < PERFECT_TOL){
    moving.x = last.x;
    combo++;
    shake += 6;
    spawnShock(moving.x, moving.y);
    spawnParticles(moving);
  } else {
    combo = 0;

    // SPLIT DEBRIS
    spawnDebris(moving, last);
    moving.w = overlap;
    moving.x = overlapStart;
  }

  blocks.push({...moving});

  score++;
  document.getElementById("score-label").innerText = score;

  spawn();
}

// ───────── VFX SYSTEM ─────────
function spawnParticles(b){
  for(let i=0;i<18;i++){
    particles.push({
      x:b.x + Math.random()*b.w,
      y:b.y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-1)*6,
      life:1,
      hue:b.color
    });
  }
}

function spawnShock(x,y){
  particles.push({shock:true,x,y,r:10,life:1});
}

function spawnDebris(m,last){
  const left = m.x < last.x ? m.x : last.x;
  const right = m.x + m.w > last.x + last.w ? m.x+m.w : last.x+last.w;

  if(m.x < last.x){
    debris.push(makePiece(m.x, m.y, last.x - m.x, m.color, -3));
  }
  if(m.x+m.w > last.x+last.w){
    debris.push(makePiece(last.x+last.w, m.y, (m.x+m.w)-(last.x+last.w), m.color, 3));
  }
}

function makePiece(x,y,w,color,vx){
  return {
    x,y,w,h:BLOCK_H,
    vx,
    vy:-2,
    rot:0,
    vr:(Math.random()-0.5)*0.2,
    color
  };
}

// ───────── UPDATE ─────────
function update(){
  // camera spring
  const target = -score*BLOCK_H + canvas.height*0.6;
  camVel += (target - cameraY)*0.08;
  camVel *= 0.7;
  cameraY += camVel;

  shake *= 0.85;

  if(moving){
    moving.x += moving.dir * BASE_SPEED;
    if(moving.x>canvas.width+100) moving.dir=-1;
    if(moving.x<-200) moving.dir=1;
  }

  // particles
  particles.forEach(p=>{
    if(p.shock){
      p.r += 8;
      p.life -= 0.05;
    } else {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.2;
      p.life -= 0.03;
    }
  });
  particles = particles.filter(p=>p.life>0);

  // debris physics
  debris.forEach(d=>{
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.3;
    d.rot += d.vr;
  });
}

// ───────── DRAW ─────────
function draw(){
  ctx.fillStyle="#07070c";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(0, shake*(Math.random()-0.5));

  // GRID PARALLAX
  ctx.globalAlpha=0.08;
  ctx.strokeStyle="#e0ff4f";
  for(let y=0;y<canvas.height;y+=50){
    ctx.beginPath();
    ctx.moveTo(0,y + cameraY*0.2%50);
    ctx.lineTo(canvas.width,y + cameraY*0.2%50);
    ctx.stroke();
  }

  // BLOCKS
  blocks.forEach(b=>{
    const y = b.y - cameraY;

    ctx.shadowBlur = combo>3 ? 25 : 10;
    ctx.shadowColor = `hsl(${b.color},100%,60%)`;

    const g = ctx.createLinearGradient(b.x,y,b.x+b.w,y+BLOCK_H);
    g.addColorStop(0,`hsl(${b.color},90%,65%)`);
    g.addColorStop(1,`hsl(${b.color+40},70%,40%)`);

    ctx.fillStyle=g;
    ctx.fillRect(b.x,y,b.w,BLOCK_H);

    ctx.shadowBlur=0;
  });

  // MOVING
  if(moving){
    const y = moving.y - cameraY;
    ctx.fillStyle=`hsl(${moving.color},80%,60%)`;
    ctx.fillRect(moving.x,y,moving.w,BLOCK_H);
  }

  // DEBRIS
  debris.forEach(d=>{
    const y = d.y - cameraY;
    ctx.save();
    ctx.translate(d.x,y);
    ctx.rotate(d.rot);
    ctx.fillStyle=`hsl(${d.color},80%,55%)`;
    ctx.fillRect(0,0,d.w,d.h);
    ctx.restore();
  });

  // PARTICLES
  particles.forEach(p=>{
    if(p.shock){
      ctx.strokeStyle=`rgba(224,255,79,${p.life})`;
      ctx.beginPath();
      ctx.arc(p.x-cameraY*0.1,p.y,p.r,0,Math.PI*2);
      ctx.stroke();
    } else {
      ctx.fillStyle=`hsla(${p.hue},100%,60%,${p.life})`;
      ctx.fillRect(p.x,p.y,3,3);
    }
  });

  ctx.restore();
}

// ───────── LOOP ─────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ───────── GAME OVER ─────────
function gameOver(){
  alert("Game Over: "+score);
  init();
}

// start
document.getElementById("start-btn").onclick=()=>{
  document.getElementById("start-screen").style.display="none";
  init();
};

loop();

})();
</script>

</body>
</html>
