<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Builder</title>
<style>
/* (CSS AYNEN KALDI) */
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --accent: #e0ff4f;
  --text: #f0f0f8;
  --muted: #4a4a6a;
  --danger: #ff4f6e;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Space Mono', monospace;
  color: var(--text);
  touch-action: none;
  user-select: none;
}
/* ... (CSSİN GERİ KALANI AYNI) ... */
</style>
</head>
<body>
<div id="app">

  <!-- HUD -->
  <div id="hud">
    <div id="score-label">0</div>
    <div id="best-label">BEST<span id="best-val">0</span></div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="perfect-flash">PERFECT</div>
  <div id="speed-badge">⚡ Speed Up!</div>

  <div class="screen" id="start-screen">
    <div class="screen-title">STACK<br>BUILDER</div>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <div class="screen hidden" id="gameover-screen">
    <div class="screen-title">GAME<br>OVER</div>
    <div id="gameover-score">SCORE — 0</div>
    <button class="btn" id="restart-btn">TRY AGAIN</button>
  </div>

</div>

<!-- 🎵 MÜZİK -->
<audio id="bg-music" src="gravity_letting_go.mp3" loop></audio>

<script>
(() => {

/* ── STATE ── */
let blocks = [], moving = null;
let score = 0, best = 0;
let hue = 160;
let cameraY = 0, targetCameraY = 0;
let gameRunning = false;
let animId = null;

/* ── DOM ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-label');
const bestEl = document.getElementById('best-val');
const startScreen = document.getElementById('start-screen');
const goScreen = document.getElementById('gameover-screen');
const goScore = document.getElementById('gameover-score');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');

/* ── 🎵 MUSIC SETUP ── */
const music = document.getElementById('bg-music');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const source = audioCtx.createMediaElementSource(music);
const lowPass = audioCtx.createBiquadFilter();

lowPass.type = "lowpass";
lowPass.frequency.value = 20000;

source.connect(lowPass);
lowPass.connect(audioCtx.destination);

/* ── RESIZE ── */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ── INIT ── */
function initGame() {
  blocks = [];
  score = 0;
  scoreEl.textContent = '0';
}

/* ── PLACE BLOCK ── */
function placeBlock() {
  score++;
  scoreEl.textContent = score;
}

/* ── END GAME ── */
function endGame() {
  gameRunning = false;
  goScore.textContent = `SCORE — ${score}`;
  goScreen.classList.remove('hidden');

  // 🎵 BOĞUK EFEKT
  lowPass.frequency.value = 600;
  music.volume = 0.5;
}

/* ── LOOP ── */
function loop() {
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  animId = requestAnimationFrame(loop);
}

/* ── INPUT ── */
canvas.addEventListener('pointerdown', () => {
  if (gameRunning) placeBlock();
});

/* ── START GAME ── */
function startGame() {
  startScreen.classList.add('hidden');
  goScreen.classList.add('hidden');

  initGame();
  gameRunning = true;

  // 🎵 MÜZİK BAŞLAT
  audioCtx.resume();
  music.currentTime = 0;
  music.play();
  music.volume = 1;
  lowPass.frequency.value = 20000;

  if (animId) cancelAnimationFrame(animId);
  loop();
}

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

loop();

})();
</script>
</body>
</html>
